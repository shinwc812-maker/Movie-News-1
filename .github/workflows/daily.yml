name: Daily Movie News Crawl

on:
  schedule:
    # UTC 23:00 = KST 08:00 (매일)
    - cron: "0 23 * * *"
  workflow_dispatch: {}   # 수동 실행

permissions:
  contents: write          # 생성물 커밋·푸시용

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"      # 한글 입출력 깨짐 방지

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Crawl news
        run: uv run python -m crawler.main
        env:
          # GitHub 시크릿이 KOFIC_API_KEY로 등록돼 있어 그 이름으로 참조한다.
          # 코드가 읽는 env 이름(KOBIS_API_KEY)은 정상 유지 — 시크릿을 KOBIS_API_KEY로 바꾸면 오른쪽만 되돌리면 됨.
          KOBIS_API_KEY: ${{ secrets.KOFIC_API_KEY }}
          # GitHub 시크릿이 NAVER_CLINET_*(오타)로 등록돼 있어 그 이름으로 참조한다.
          # 코드가 읽는 env 이름(NAVER_CLIENT_*)은 정상 유지. 이게 안 맞으면 네이버 API가
          # 빈 키로 스킵되고 Google News RSS 폴백을 타 기사 링크가 안 열린다.
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLINET_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLINET_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Build static site
        # 'site'는 파이썬 표준 모듈명이라 'python -m site.build'는 불가 — 파일 경로로 실행
        run: uv run python site/build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist data
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 푸시 생략"
          else
            git commit -m "chore: 영화 뉴스 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
          fi
