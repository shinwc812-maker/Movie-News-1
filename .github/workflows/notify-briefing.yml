name: Notify AI Briefing

# routine 또는 사람이 data/ai_briefing.json 을 push하면 이메일로 발송.
# Gmail SMTP 사용 — GitHub Secrets 에 GMAIL_USER, GMAIL_APP_PASSWORD, GMAIL_RECIPIENTS 필요.
# GMAIL_RECIPIENTS 는 쉼표 구분 다중 수신자 (예: "a@x.com, b@y.com, c@z.com").
# 미설정 시 GMAIL_USER 본인에게만 발송.

on:
  push:
    branches: [main]
    paths:
      - "data/ai_briefing.json"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set today's date (KST)
        id: today
        run: echo "date=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # 파이차트를 인라인(CID) 이미지로 심어 발송 — Outlook 등 외부 이미지 차단
      # 환경에서도 차트가 보이도록 Python smtplib로 직접 발송한다.
      # (dawidd6/action-send-mail은 CID 인라인 첨부를 지원하지 않음)
      - name: Send AI briefing email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENTS: ${{ secrets.GMAIL_RECIPIENTS }}
          MAIL_SUBJECT: "[오늘의 AI 브리핑] ${{ steps.today.outputs.date }}"
          PYTHONUTF8: "1"
        run: python scripts/send_mail.py
