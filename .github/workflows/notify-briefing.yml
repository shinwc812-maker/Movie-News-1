name: Notify AI Briefing

# routine 또는 사람이 data/ai_briefing.json 을 push하면 이메일로 발송.
# Gmail SMTP 사용 — GitHub Secrets 에 GMAIL_USER, GMAIL_APP_PASSWORD, GMAIL_RECIPIENTS 필요.
# GMAIL_RECIPIENTS 는 쉼표 구분 다중 수신자 (예: "a@x.com, b@y.com, c@z.com").
# 미설정 시 GMAIL_USER 본인에게만 발송.

on:
  push:
    branches: [main]
    paths:
      - "data/ai_briefing.json"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set today's date (KST)
        id: today
        run: echo "date=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build mail bodies (text + html)
        run: |
          python scripts/build_mail_body.py text > mail_body.txt
          python scripts/build_mail_body.py html > mail_body.html
          echo "--- text preview (head) ---"
          head -20 mail_body.txt
          echo "--- html size ---"
          wc -c mail_body.html

      - name: Send AI briefing email
        if: ${{ env.GMAIL_USER != '' && env.GMAIL_APP_PASSWORD != '' }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: "AI Briefing Bot <${{ secrets.GMAIL_USER }}>"
          to: ${{ secrets.GMAIL_RECIPIENTS != '' && secrets.GMAIL_RECIPIENTS || secrets.GMAIL_USER }}
          subject: "[오늘의 AI 브리핑] ${{ steps.today.outputs.date }}"
          body: file://mail_body.txt
          html_body: file://mail_body.html
          convert_markdown: false
