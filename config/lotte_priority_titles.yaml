# 자사(롯데컬처웍스) 우선 작품 분류
#
# 분류 우선순위 (위에서 아래로 — 같은 작품이 여러 카테고리에 들어가면 위쪽 분류 우선):
#   1. lotte_ip          — 롯데 자체 IP 활용 작품(제작·투자 포함)
#   2. lotte_exclusive   — 롯데시네마 단독상영작(콘서트 실황·특별 상영 등)
#   3. paramount_lotte   — 파라마운트가 만든 영화 중 국내 배급을 롯데가 맡은 작품
#   4. (자동) lotte_distrib — KOBIS distributor에 '롯데컬처웍스'가 잡히는 작품 (예: 와일드 씽)
#
# 매칭은 KOBIS 영화 제목과 정확 일치 또는 공백 제거 후 부분일치로 처리.
# 비어 있어도 정상 동작하며, 자사 작품은 자동 카테고리(lotte_distrib)만으로 분류됩니다.

paramount_lotte: []
  # 예시:
  # - 미션 임파서블: 파이널 레코닝
  # - 노스맨

lotte_exclusive: []
  # 예시:
  # - 플레이브 콘서트 실황

lotte_ip: []
  # 예시:
  # - (롯데 IP 활용 작품)
