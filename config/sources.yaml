# 네이버 뉴스 검색 API 설정
#
# 네이버 오픈 API는 "카테고리(문화/예술)" 파라미터가 없어 키워드 검색으로만 모은다.
# 영화·공연·문화·예술을 폭넓게 수집한 뒤, 점수/필터로 표시 단계에서 거른다.
# 수집 범위를 넓히거나 줄이려면 아래 queries만 손보면 된다.
#
# 자격증명은 환경변수로 주입: NAVER_CLIENT_ID / NAVER_CLIENT_SECRET
# (네이버 개발자센터 https://developers.naver.com 에서 애플리케이션 등록 후 발급)

naver:
  display: 30        # 쿼리당 가져올 기사 수 (최대 100)
  sort: date         # date=최신순, sim=정확도순
  queries:
    # 영화
    - 영화
    - 박스오피스
    - 영화 개봉
    - 영화제
    # 공연·문화·예술
    - 공연
    - 뮤지컬
    - 연극
    - 전시회
