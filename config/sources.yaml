# 네이버 뉴스 검색 API 설정
#
# 네이버 오픈 API는 "카테고리(문화/예술)" 파라미터가 없어 키워드 검색으로만 모은다.
# 영화·공연을 폭넓게 수집한 뒤, 아래 filter로 표시 단계에서 노이즈를 거른다.
#
# 자격증명은 환경변수로 주입: NAVER_CLIENT_ID / NAVER_CLIENT_SECRET

naver:
  display: 30        # 쿼리당 가져올 기사 수 (최대 100)
  sort: date         # date=최신순, sim=정확도순

  # 막연한 "영화"·"공연"은 노이즈가 너무 커서 구체적 표현으로 좁힘
  queries:
    - 영화 개봉
    - 박스오피스
    - 영화제
    - 영화 시사회
    - 개봉작
    - 한국영화
    - 뮤지컬
    - 연극

  # 표시 필터: 네이버 일반 기사 중 영화/공연 관련만 남긴다.
  # (배급사/박스오피스 매칭 기사는 이 필터와 무관하게 항상 표시됨)
  # - exclude_any 단어가 하나라도 있으면 제외
  # - 그다음 require_any 단어가 하나도 없으면 제외
  # 결과를 보고 이 두 목록만 늘리거나 줄여서 조정하면 된다.
  filter:
    require_any:
      - 개봉
      - 박스오피스
      - 시사회
      - 영화제
      - 예고편
      - 촬영
      - 캐스팅
      - 극장판
      - 관객
      - 흥행
      - 주연
      - 출연
      - 무대인사
      - 연출
      - 초연
      - 개막
      - 메가폰
      - 작품상
      - 평론
      - 스크린
      - 데뷔작
      - 신작
      - 영화관
      - 상영
      - 각본
      - 칸
      - 연극
      - 연극제
      - 뮤지컬
      - 공연예술
      - 베니스
      - 베를린
      - 단편
      - 다큐
      - 관람객
    exclude_any:
      # 정치
      - 공약
      - 선거
      - 유세
      - 출마
      - 국회
      - 도지사
      # 연예 가십
      - 열애
      - 결혼
      - 이혼
      - 임신
      - 출산
      - 육아
      - 실신
      - 갑론을박
      - 신불자
      - 신용불량
      - 빚
      - 자택
      - 침입
      - 강도
      - 병역
      - 근황
      - 화보
      - 성형
      # 행정·홍보·이벤트
      - 지원사업
      - 할인권
      - 선착순
      - 보조금
      - 지원센터
      - 시설공단
      - 분양
      - 청약
      - 관광
      - 업무협약
      - 엑스포
      - 박람회
      - 축제
      - 리조트
      - 건설
      - 졸업
      - 생일
      - 패션
      - 드론
      - 거래액
      - 디스플레이
      - 폴더블
      - 쿠페
      - 엔진
      - 은행
      - 자산관리
      - 굿즈
      - 팝업
      - 상주단체
